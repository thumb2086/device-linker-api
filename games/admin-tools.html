<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中心 | 子熙模擬器</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/admin-tools.css">
</head>

<body class="admin-tools-body">
    <div class="page-header">
        <a href="/" class="back-btn">返回首頁</a>
        <div class="header-stats">
            <span class="vip" id="header-vip">-</span>
            <span><span class="balance" id="header-balance">-</span> 子熙幣</span>
            <button class="logout-btn" onclick="logoutUser()">登出</button>
        </div>
    </div>

    <div class="casino-card" id="main-card">
        <div class="user-stats">
            <span id="vip-badge">管理員</span>
            <div class="stat-row">目前餘額: <span id="balance-val">0.00</span> 子熙幣</div>
            <div class="stat-row">累計下注: <span id="total-bet-val">0.00</span> 子熙幣</div>
            <div class="stat-row">顯示名稱: <span id="display-name-val">未設定</span></div>
        </div>

        <div id="announcements-section" class="section-block announcement-section section-block-primary">
            <div class="section-heading-row">
                <div>
                    <h2>公告中心管理</h2>
                    <p class="tool-note">平常不需要操作時可以保持收合。需要發布或調整時再展開，避免管理頁過長。</p>
                </div>
                <button id="announcement-toggle-btn" class="btn-secondary compact-btn" onclick="toggleAnnouncementSection()">展開公告中心</button>
            </div>

            <div id="announcements-section-body" class="collapsible-body hidden">
                <div class="summary-grid announcement-summary-grid">
                    <div class="summary-card">
                        <span>公告總數</span>
                        <strong id="announcement-total-count">0</strong>
                    </div>
                    <div class="summary-card">
                        <span>啟用中</span>
                        <strong id="announcement-active-count">0</strong>
                    </div>
                    <div class="summary-card">
                        <span>置頂中</span>
                        <strong id="announcement-pinned-count">0</strong>
                    </div>
                </div>

                <div class="announcement-editor-card">
                    <h3>發布新公告</h3>
                    <div class="announcement-form-grid">
                        <label>
                            標題
                            <input id="announcement-title" class="text-input" type="text" maxlength="120" placeholder="例如：3/8 晚上 10 點進行更新">
                        </label>
                        <label class="toggle-field">
                            <input id="announcement-pinned" type="checkbox">
                            <span>置頂公告</span>
                        </label>
                        <label class="full-span">
                            內容
                            <textarea id="announcement-content" class="text-input announcement-textarea" placeholder="請填寫更新內容、影響範圍、預估時間"></textarea>
                        </label>
                    </div>
                    <div class="form-row single-row">
                        <button class="btn-primary" onclick="publishAnnouncement()">發布公告</button>
                    </div>
                </div>
                <p id="announcement-admin-status-msg" class="status-msg">尚未載入公告</p>

                <div id="announcement-admin-list" class="announcement-admin-list">
                    <div class="result-empty">尚未載入公告</div>
                </div>
            </div>
        </div>

        <div id="issue-reports-section" class="section-block section-block-secondary">
            <div class="section-heading-row">
                <div>
                    <h2>意見回饋管理</h2>
                    <p class="tool-note">查看並回覆使用者提交的問題與建議。</p>
                </div>
                <button id="issue-toggle-btn" class="btn-secondary compact-btn" onclick="toggleIssueSection()">展開意見回饋</button>
            </div>
            <div id="issues-section-body" class="collapsible-body hidden">
                <div class="admin-toolbar">
                    <label>
                        過濾狀態:
                        <select id="issue-status-filter" class="text-input" onchange="renderIssueReports()">
                            <option value="">全部</option>
                            <option value="open">待處理</option>
                            <option value="in_progress">處理中</option>
                            <option value="resolved">已處理</option>
                        </select>
                    </label>
                    <label>
                        選擇回報:
                        <select id="issue-report-selector" class="text-input" onchange="onIssueReportSelected(this.value)">
                             <option value="">請先同步</option>
                        </select>
                    </label>
                </div>
                 <div class="summary-grid">
                     <div class="summary-card">
                        <span>顯示中</span>
                        <strong id="issue-visible-count">0</strong>
                    </div>
                    <div class="summary-card">
                        <span>待處理</span>
                        <strong id="issue-open-count">0</strong>
                    </div>
                     <div class="summary-card">
                        <span>處理中</span>
                        <strong id="issue-progress-count">0</strong>
                    </div>
                </div>
                <p id="issue-status-msg" class="status-msg">尚未載入</p>
                <div id="issue-report-list" class="issue-report-container">
                     <div class="result-empty">請先選擇一則意見回饋</div>
                </div>
            </div>
        </div>

        <div id="win-bias-section" class="section-block win-bias-section section-block-muted">
            <!-- ... content of win-bias-section ... -->
        </div>
    </div>
    <script src="/js/auth.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/admin-tools.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            guardAdmin().then(initAdminToolsPage);
        });
    </script>
</body>
</html>
