<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理工具</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/admin-tools.css">
</head>
<body class="admin-body">
  <div class="admin-container">
    <h1><a href="/games/lobby.html">⚡️</a> 管理工具</h1>
    <p id="status-msg" class="status-msg"></p>
    <div id="admin-toast-stack" class="admin-toast-stack"></div>

    <!-- Maintenance Section -->
    <div class="admin-section">
      <div class="admin-section-head">
        <h2>系統維護</h2>
        <button id="maintenance-toggle-btn" class="btn-secondary compact-btn" onclick="toggleMaintenanceSection()">展開維護模式</button>
      </div>
      <div id="maintenance-section-body" class="admin-section-body hidden">
        <p id="maintenance-status-msg" class="status-msg"></p>
        <div class="form-grid single-col">
          <label class="toggle-field">
            <input id="maintenance-enabled" type="checkbox">
            <span>啟用維護模式</span>
          </label>
          <label><span>標題</span><input id="maintenance-title" type="text" class="text-input"></label>
          <label><span>訊息</span><textarea id="maintenance-message" class="text-input"></textarea></label>
        </div>
        <div class="admin-actions">
          <button class="btn-primary" onclick="saveMaintenance()">儲存設定</button>
        </div>
      </div>
    </div>

    <!-- Issues Section -->
    <div class="admin-section">
        <div class="admin-section-head">
            <h2>意見回饋</h2>
            <button id="issue-toggle-btn" class="btn-secondary compact-btn" onclick="toggleIssueSection()">展開意見回饋</button>
        </div>
        <div id="issues-section-body" class="admin-section-body hidden">
            <p id="issue-status-msg" class="status-msg"></p>
            <div class="admin-toolbar">
                <label>狀態過濾: 
                    <select id="issue-status-filter" class="text-input">
                        <option value="">全部</option>
                        <option value="open">待處理</option>
                        <option value="in_progress">處理中</option>
                        <option value="resolved">已處理</option>
                    </select>
                </label>
                <div class="stat-chips">
                    <span class="stat-chip">顯示 <span id="issue-visible-count">0</span></span>
                    <span class="stat-chip">總共 <span id="issue-total-count">0</span></span>
                    <span class="stat-chip warn">待處理 <span id="issue-open-count">0</span></span>
                    <span class="stat-chip info">處理中 <span id="issue-progress-count">0</span></span>
                </div>
            </div>
            <div id="issue-report-list" class="issue-report-container"></div>
            <div class="admin-actions">
                <button id="issue-load-more-btn" class="btn-secondary" style="display: none;">載入更多</button>
            </div>
        </div>
    </div>

    <!-- Other sections remain unchanged... -->

  </div>
  <script src="/js/auth.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/admin-tools.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      guardAdmin().then(initAdminToolsPage);
    });
  </script>
</body>
</html>
