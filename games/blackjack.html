<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二十一點 | 子熙賭場</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/blackjack.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
</head>

<body class="blackjack-body">

    <div class="page-header">
        <a href="/games/casino.html" class="back-btn">← 返回賭場</a>
        <div class="header-stats">
             <div class="audio-player" id="audio-player-controls">
                <button class="audio-player-mute-btn" id="mute-btn">🔊</button>
                <div class="audio-player-volume-controls">
                    <div class="audio-player-volume-slider">
                        <span>BGM</span>
                        <input type="range" id="bgm-volume-slider" min="0" max="1" step="0.05">
                    </div>
                    <div class="audio-player-volume-slider">
                        <span>SFX</span>
                        <input type="range" id="sfx-volume-slider" min="0" max="1" step="0.05">
                    </div>
                </div>
            </div>
            <span class="vip" id="header-vip">-</span>
            <span><span class="balance" id="header-balance">-</span> 子熙幣</span>
            <button class="logout-btn" onclick="logoutUser()">登出</button>
        </div>
    </div>

    <div class="casino-card" id="main-card">
        <h1>🃏 二十一點</h1>

        <div class="user-stats">
            <span id="vip-badge">普通會員</span>
            <div class="stat-row">餘額: <span id="balance-val">0.00</span> 子熙幣</div>
            <div class="stat-row">累計押注: <span id="total-bet-val">0.00</span> 子熙幣</div>
        </div>

        <div class="table-area">
            <div class="side-area">
                <div class="side-title">莊家 <span id="dealer-total">0</span></div>
                <div class="cards-row" id="dealer-cards"></div>
            </div>

            <div class="versus">VS</div>

            <div class="side-area">
                <div class="side-title">你 <span id="player-total">0</span></div>
                <div class="cards-row" id="player-cards"></div>
            </div>
        </div>

        <div id="odds-banner">黑傑克 1.5x，普通勝利 1x（利潤）</div>

        <input type="number" id="bet-amount" value="10" min="1" placeholder="輸入押注金額">

        <div class="blackjack-actions">
            <button class="btn-deal" id="deal-btn" onclick="startBlackjack()">發牌</button>
            <button class="btn-action" id="hit-btn" onclick="playerHit()" disabled>要牌</button>
            <button class="btn-action" id="stand-btn" onclick="playerStand()" disabled>停牌</button>
        </div>

        <p id="status-msg">準備開始...</p>
        <div id="tx-log"></div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/audio-manager.js"></script>
    <script src="../js/blackjack.js"></script>
    <script>
        function initAudioPlayer() {
            const audioManager = window.audioManager;
            const muteBtn = document.getElementById('mute-btn');
            const bgmSlider = document.getElementById('bgm-volume-slider');
            const sfxSlider = document.getElementById('sfx-volume-slider');

            // 1. 初始化 UI 狀態
            const updateMuteButton = () => {
                muteBtn.textContent = audioManager.isMuted ? '🔇' : '🔊';
            };

            bgmSlider.value = audioManager.bgmVolume;
            sfxSlider.value = audioManager.sfxVolume;
            updateMuteButton();

            // 2. 綁定事件監聽
            muteBtn.addEventListener('click', () => {
                audioManager.setMute(!audioManager.isMuted);
                updateMuteButton();
            });

            bgmSlider.addEventListener('input', (e) => {
                const volume = parseFloat(e.target.value);
                audioManager.setBgmVolume(volume);
            });

            sfxSlider.addEventListener('input', (e) => {
                const volume = parseFloat(e.target.value);
                audioManager.setSfxVolume(volume);
            });

            console.log('🔊 Audio Player UI Initialized');
        }

        window.onload = function () {
            checkGameAuth(function (data) {
                updateUI(data);
                startBalanceRefresh();
                initAudioPlayer(); // 初始化音訊播放器 UI

                if (window.audioManager) {
                    window.audioManager.playBGM('casino');
                }
            });
        };
    </script>

    <!-- Vercel Speed Insights -->
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>

</body>

</html>
