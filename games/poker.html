<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>德州撲克 | 子熙模擬器</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/table-games.css">
</head>

<body class="casino-body">
    <div class="page-header">
        <a href="/games/casino.html" class="back-btn">返回賭場</a>
        <div class="header-stats">
            <span class="vip" id="header-vip">-</span>
            <span><span class="balance" id="header-balance">-</span> 子熙幣</span>
            <button class="logout-btn" onclick="logoutUser()">登出</button>
        </div>
    </div>

    <main class="casino-card table-game-shell" id="main-card">
        <section class="table-game-hero">
            <div>
                <p class="table-game-kicker">Texas Hold'em</p>
                <h1>德州撲克</h1>
                <p class="table-game-subtitle">支援多位真人同桌，空位由 bot 補位；1 位真人也可開局。VIP 一號桌與二號桌會依 YJC 持有量解鎖。</p>
            </div>
            <div class="table-toolbar">
                <select id="poker-table-select" class="text-input"></select>
                <button class="btn-primary" id="poker-join-btn" onclick="joinPokerTable()">入座</button>
                <button class="btn-secondary" id="poker-leave-btn" onclick="leavePokerTable()">離桌</button>
                <button class="btn-secondary" id="poker-start-btn" onclick="startPokerHand()">開新局</button>
            </div>
        </section>

        <section class="table-panel">
            <div class="table-panel-head">
                <div>
                    <h2 id="poker-table-title">公共桌</h2>
                    <div class="table-status-note" id="poker-status-note">讀取中...</div>
                </div>
                <div class="table-pill" id="poker-pot-pill">底池 0</div>
            </div>
            <div class="community-cards" id="poker-community-cards"></div>
            <div class="table-result" id="poker-result"></div>
        </section>

        <section class="table-panel">
            <div class="table-panel-head">
                <h2>桌上座位</h2>
                <div class="table-status-note" id="poker-turn-note">等待同步...</div>
            </div>
            <div class="seat-grid" id="poker-seat-grid"></div>
        </section>

        <section class="table-panel">
            <div class="table-panel-head">
                <h2>你的操作</h2>
            </div>
            <div class="table-action-row">
                <button class="btn-secondary" id="poker-fold-btn" onclick="sendPokerMove('fold')">蓋牌</button>
                <button class="btn-secondary" id="poker-check-btn" onclick="sendPokerMove('check')">過牌</button>
                <button class="btn-secondary" id="poker-call-btn" onclick="sendPokerMove('call')">跟注</button>
                <button class="btn-primary" id="poker-raise-btn" onclick="sendPokerMove('raise')">加注</button>
            </div>
        </section>

        <section class="table-panel">
            <div class="table-panel-head">
                <h2>本桌紀錄</h2>
            </div>
            <div class="table-log" id="poker-log"></div>
        </section>
    </main>

    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/poker.js"></script>
    <script>
        window.onload = function () {
            checkGameAuth(function (data) {
                updateUI(data);
                startBalanceRefresh();
                initPokerPage();
            });
        };
    </script>
</body>

</html>
