<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道具與稱號指南 | 子熙模擬器</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/guides.css">
    <style>
        .guide-section-head {
            margin: 48px 0 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(255, 204, 0, 0.18);
            color: #ffd36a;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .reward-guide-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .reward-guide-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 22px;
            padding: 22px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .reward-guide-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 204, 0, 0.25);
        }

        .reward-guide-card strong {
            display: block;
            font-size: 1.25rem;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .reward-guide-type {
            font-size: 0.72rem;
            color: #ffd36a;
            background: rgba(255, 204, 0, 0.12);
            padding: 4px 12px;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
            display: inline-block;
            font-weight: 700;
        }

        .reward-guide-desc {
            font-size: 0.94rem;
            color: #afc2d6;
            line-height: 1.6;
            margin-bottom: 14px;
        }

        .reward-guide-details {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.88rem;
        }

        .detail-item {
            margin-bottom: 6px;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .detail-label {
            color: #5c6c7d;
            font-weight: 700;
            white-space: nowrap;
        }

        .detail-value {
            color: #d7e5f5;
        }

        .rarity-chip {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .rarity-epic { background: rgba(163, 53, 238, 0.2); color: #d8b4fe; border: 1px solid rgba(163, 53, 238, 0.3); }
        .rarity-mythic { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
        .rarity-legendary { background: rgba(245, 158, 11, 0.2); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.3); }
    </style>
</head>

<body class="guides-body">
    <div class="page-header">
        <a href="/" class="back-btn">← 返回首頁</a>
    </div>

    <div class="casino-card guides-card">
        <div class="guides-hero">
            <p class="section-kicker">資產說明</p>
            <h1>📦 道具與稱號指南</h1>
            <p class="guides-subtitle">完整查看所有 Buff 道具、開運寶箱、成就稱號與頭像外觀的詳細效果與取得途徑。</p>
        </div>

        <div id="guide-content">
            <h2 class="guide-section-head">✨ 增益道具 (Buffs)</h2>
            <div id="guide-buffs" class="reward-guide-grid"></div>

            <h2 class="guide-section-head">🎁 寶箱與補給箱</h2>
            <div id="guide-chests" class="reward-guide-grid"></div>

            <h2 class="guide-section-head">🏷️ 成就稱號</h2>
            <div id="guide-titles" class="reward-guide-grid"></div>

            <h2 class="guide-section-head">🖼️ 頭像外觀</h2>
            <div id="guide-avatars" class="reward-guide-grid"></div>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script>
        function rarityClass(rarity) {
            var r = String(rarity || '').toLowerCase();
            if (r === 'epic' || r === 'mythic' || r === 'legendary') return 'rarity-' + r;
            return '';
        }

        function renderGuide(data) {
            var catalog = data.catalog;
            if (!catalog) return;

            var buffsHtml = '';
            var chestsHtml = '';
            var titlesHtml = '';
            var avatarsHtml = '';

            (catalog.shopItems || []).forEach(function (item) {
                var html = '<div class="reward-guide-card">' +
                    '<div class="reward-guide-type">' + (item.type === 'buff' ? '增益道具' : '寶箱道具') + '</div>' +
                    '<strong>' + item.name + '</strong>' +
                    '<div class="reward-guide-desc">' + (item.description || '暫無說明') + '</div>' +
                    '<div class="reward-guide-details">' +
                        '<div class="detail-item"><span class="detail-label">稀有度:</span><span class="detail-value rarity-chip ' + rarityClass(item.rarity) + '">' + (item.rarity || '普通') + '</span></div>' +
                    '</div>' +
                    '</div>';

                if (item.type === 'buff') buffsHtml += html;
                else chestsHtml += html;
            });

            (catalog.titles || []).forEach(function (item) {
                titlesHtml += '<div class="reward-guide-card">' +
                    '<div class="reward-guide-type">成就稱號</div>' +
                    '<strong>' + item.name + '</strong>' +
                    '<div class="reward-guide-desc">' + (item.shopDescription || item.description || '更換個人顯示稱號') + '</div>' +
                    '<div class="reward-guide-details">' +
                        '<div class="detail-item"><span class="detail-label">稀有度:</span><span class="detail-value rarity-chip ' + rarityClass(item.rarity) + '">' + (item.rarity || '普通') + '</span></div>' +
                        '<div class="detail-item"><span class="detail-label">取得途徑:</span><span class="detail-value">' + (item.source || '商店購買') + '</span></div>' +
                    '</div>' +
                    '</div>';
            });

            (catalog.avatars || []).forEach(function (item) {
                avatarsHtml += '<div class="reward-guide-card">' +
                    '<div class="reward-guide-type">頭像外觀</div>' +
                    '<strong>' + (item.icon || '👤') + ' ' + item.name + '</strong>' +
                    '<div class="reward-guide-desc">' + (item.description || '更換你的個人頭像顯示') + '</div>' +
                    '<div class="reward-guide-details">' +
                        '<div class="detail-item"><span class="detail-label">取得途徑:</span><span class="detail-value">' + (item.source || '活動或寶箱') + '</span></div>' +
                    '</div>' +
                    '</div>';
            });

            document.getElementById('guide-buffs').innerHTML = buffsHtml || '<div class="reward-empty">暫無資料</div>';
            document.getElementById('guide-chests').innerHTML = chestsHtml || '<div class="reward-empty">暫無資料</div>';
            document.getElementById('guide-titles').innerHTML = titlesHtml || '<div class="reward-empty">暫無資料</div>';
            document.getElementById('guide-avatars').innerHTML = avatarsHtml || '<div class="reward-empty">暫無資料</div>';
        }

        window.onload = function () {
            fetch('/api/rewards', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'summary', sessionId: 'public' })
            })
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    if (data && data.success) renderGuide(data);
                })
                .catch(function (e) { console.error('Guide load failed', e); });
        };
    </script>
</body>

</html>
