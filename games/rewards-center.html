<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>獎勵中心 | 子熙賭場</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/rewards-center.css">
</head>

<body class="rewards-body">
    <div class="page-header">
        <a href="/" class="back-btn">返回首頁</a>
        <div class="header-stats">
            <span class="vip" id="header-vip">-</span>
            <span><span class="balance" id="header-balance">-</span> 子熙幣</span>
            <button class="logout-btn" onclick="logoutUser()">登出</button>
        </div>
    </div>

    <div class="casino-card rewards-shell" id="main-card">
        <h1>獎勵中心</h1>

        <div class="user-stats">
            <span id="vip-badge">普通會員</span>
            <div class="stat-row">鏈上餘額: <span id="balance-val">0.00</span> 子熙幣</div>
            <div class="stat-row">累計押注: <span id="total-bet-val">0.00</span> 子熙幣</div>
        </div>

        <div class="rewards-hero">
            <div class="rewards-identity-card">
                <div class="identity-avatar" id="identity-avatar">🪙</div>
                <div class="identity-info-box">
                    <div class="identity-label">目前裝備</div>
                    <h2 id="identity-title">VIP 自動稱號</h2>
                    <div id="identity-title-desc" class="identity-desc-area"></div>
                    <p id="identity-avatar-name">經典籌碼</p>
                    <div id="identity-avatar-desc" class="identity-desc-area" style="border-left-color: #9fd0ff; background: rgba(159, 208, 255, 0.08); color: #9fd0ff; margin-top: 4px;"></div>
                </div>
            </div>
            <div class="rewards-hero-copy">
                <p class="rewards-kicker">Campaign / Shop / Inventory</p>
                <p>活動、商店、背包、頭像、稱號與 Buff 改成分頁管理，玩家可以直接知道該去哪裡領、去哪裡開、去哪裡裝備。</p>
            </div>
        </div>

        <p id="rewards-status" class="rewards-status">同步中...</p>

        <div class="rewards-nav">
            <button class="rewards-nav-btn active" data-tab="campaign" onclick="switchRewardsTab('campaign')">限時活動</button>
            <button class="rewards-nav-btn" data-tab="shop" onclick="switchRewardsTab('shop')">商店</button>
        </div>

        <section class="rewards-section rewards-panel active" data-panel="campaign">
            <div class="section-heading">
                <h2>限時領取</h2>
                <button class="btn-secondary compact-btn" onclick="refreshRewardsCenter()">重新整理</button>
            </div>
            <div id="campaign-list" class="reward-card-list reward-grid-list">
                <div class="reward-empty">目前沒有可顯示的活動</div>
            </div>
        </section>

        <section class="rewards-section rewards-panel" data-panel="shop">
            <div class="section-heading">
                <h2>商店</h2>
            </div>
            <div class="shop-split-grid">
                <div>
                    <h3 class="reward-subheading">道具商店</h3>
                    <div id="shop-list" class="reward-card-list reward-grid-list">
                        <div class="reward-empty">載入中...</div>
                    </div>
                </div>
                <div>
                    <h3 class="reward-subheading">稱號商店</h3>
                    <div id="title-shop-filter" class="reward-filter-row">
                        <button class="reward-filter-chip active">全部</button>
                    </div>
                    <div id="title-shop-list" class="reward-card-list">
                        <div class="reward-empty">目前沒有上架稱號</div>
                    </div>
                </div>
            </div>
        </section>


        <section class="rewards-section guide-section">
            <div class="guide-promo-card">
                <div class="guide-promo-content">
                    <h3>💡 想要更了解道具效果？</h3>
                    <p>查看完整的道具效果說明、稱號取得途徑以及頭像外觀指南。</p>
                </div>
                <a href="reward-guide.html" class="btn-secondary">查看說明指南</a>
            </div>
        </section>
    </div>

    <div id="reward-result-modal" class="reward-result-modal hidden">
        <div class="reward-result-dialog">
            <div class="reward-result-badge">已獲得</div>
            <h2 id="reward-result-title">獎勵到手</h2>
            <div id="reward-result-list" class="reward-result-list"></div>
            <button class="btn-primary" onclick="closeRewardResultModal()">我知道了</button>
        </div>
    </div>

    <div id="rewards-toast-stack" class="rewards-toast-stack" aria-live="polite" aria-atomic="true"></div>

    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/rewards-center.js"></script>
    <script>
        window.onload = function () {
            checkGameAuth(function (data) {
                updateUI(data);
                startBalanceRefresh();
                initRewardsCenterPage();
            });
        };
    </script>
</body>

</html>
