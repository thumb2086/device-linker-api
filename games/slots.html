<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老虎機 | 子熙賭場</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/slots.css">
</head>

<body class="slots-body">

    <div class="page-header">
        <a href="/games/casino.html" class="back-btn">← 返回賭場</a>
        <div class="header-stats">
            <span class="vip" id="header-vip">-</span>
            <span><span class="balance" id="header-balance">-</span> 子熙幣</span>
            <button class="logout-btn" onclick="logoutUser()">登出</button>
        </div>
    </div>

    <div class="casino-card" id="main-card">
        <h1>🎰 老虎機</h1>

        <div class="user-stats">
            <span id="vip-badge">普通會員</span>
            <div class="stat-row">餘額: <span id="balance-val">0.00</span> 子熙幣</div>
            <div class="stat-row">累計押注: <span id="total-bet-val">0.00</span> 子熙幣</div>
        </div>

        <div class="slots-machine">
            <div class="slots-layout">
                <div class="slots-board-wrap">
                    <div class="slots-board-header">
                        <span class="slots-board-title">主轉盤</span>
                        <span class="slots-board-note">3x3 全線判定</span>
                    </div>
                    <div class="slots-board" id="slots-board">
                        <div class="reels-grid" id="reels-grid"></div>
                        <svg class="payline-svg-overlay" id="payline-svg" aria-hidden="true"></svg>
                    </div>
                    <div class="slots-result-strip">
                        <div class="slots-result-chip" id="slots-result-type">待命中</div>
                        <div class="slots-result-copy" id="slots-result-copy">三連中獎、雙連退半與交易狀態都會顯示在這裡。</div>
                    </div>
                </div>

                <div class="payout-panel">
                    <div class="payout-panel-head">
                        <h2>派彩表</h2>
                        <p>三連固定 15% 中獎率，雙連退回 0.5 倍。</p>
                    </div>
                    <div class="payout-info">
                        <div class="payout-item">
                            <span class="payout-symbol">7️⃣7️⃣7️⃣</span>
                            <span class="payout-mult">50x</span>
                            <span class="payout-rate">0.2%</span>
                        </div>
                        <div class="payout-item">
                            <span class="payout-symbol">💎💎💎</span>
                            <span class="payout-mult">15x</span>
                            <span class="payout-rate">0.8%</span>
                        </div>
                        <div class="payout-item">
                            <span class="payout-symbol">⭐⭐⭐</span>
                            <span class="payout-mult">8x</span>
                            <span class="payout-rate">1.5%</span>
                        </div>
                        <div class="payout-item">
                            <span class="payout-symbol">🔔🔔🔔</span>
                            <span class="payout-mult">5x</span>
                            <span class="payout-rate">2.0%</span>
                        </div>
                        <div class="payout-item">
                            <span class="payout-symbol">🍋🍋🍋</span>
                            <span class="payout-mult">3x</span>
                            <span class="payout-rate">2.5%</span>
                        </div>
                        <div class="payout-item">
                            <span class="payout-symbol">🍒🍒🍒</span>
                            <span class="payout-mult">2x</span>
                            <span class="payout-rate">3.0%</span>
                        </div>
                    </div>
                    <p class="slots-odds-note">支援上、中、下三條橫線，左、中、右三條垂直線，以及兩條斜線。7️⃣ 圖示已改為固定格內縮放，不再超出框線。</p>
                </div>
            </div>
        </div>

        <div class="spin-controls">
            <input type="number" id="bet-amount" value="10" min="1" placeholder="輸入押注金額">
            <button class="btn-spin" id="spin-btn">🎰 旋轉</button>
        </div>
        <p id="max-bet-note" class="slots-helper-note">單注上限將依目前 VIP 等級計算</p>

        <p id="status-msg">準備開始...</p>

        <div id="tx-log"></div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="../js/audio-manager.js"></script>
    <script src="../js/slots.js"></script>
    <script>
        window.onload = function () {
            showPageTransition('驗證登入中...');
            checkGameAuth(function (data) {
                updateUI(data);
                startBalanceRefresh();
                const slotMachine = new SlotMachine(document.getElementById('reels-grid'), document.getElementById('payline-svg'));
                document.getElementById('spin-btn').onclick = () => slotMachine.spin();
                hidePageTransition();
            });
        };
    </script>

    <!-- Vercel Speed Insights -->
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>

</body>

</html>
