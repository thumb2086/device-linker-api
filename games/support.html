<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>意見回饋中心 | 子熙模擬器</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/support.css">
</head>

<body class="support-body">
    <div class="page-header">
        <a href="/" class="back-btn">返回首頁</a>
        <div class="header-stats">
            <span class="vip" id="header-vip">-</span>
            <span><span class="balance" id="header-balance">-</span> 子熙幣</span>
            <button class="logout-btn" onclick="logoutUser()">登出</button>
        </div>
    </div>

    <div class="casino-card" id="main-card">
        <div class="support-hero">
            <p class="support-kicker">Support Center</p>
            <h1>意見回饋中心</h1>
            <p class="support-hero-copy">公告獨立公開，回饋集中處理。你可以在這裡提交想法、補充資訊，並持續追蹤管理員的最新處理更新。</p>
        </div>

        <div class="user-stats">
            <span id="vip-badge">載入中</span>
            <div class="stat-row">目前餘額: <span id="balance-val">0.00</span> 子熙幣</div>
            <div class="stat-row">累計下注: <span id="total-bet-val">0.00</span> 子熙幣</div>
            <div class="stat-row">顯示名稱: <span id="display-name-val">未設定</span></div>
        </div>

        <div class="section-block">
            <h2>提交意見回饋</h2>
            <p class="tool-note">請盡量寫清楚發生頁面、重現方式、時間點或想法建議。管理員處理後，會在下方的回饋紀錄更新狀態與備註。</p>
            <div class="support-form-grid">
                <label>
                    類別
                    <select id="report-category" class="text-input">
                        <option value="general">一般問題</option>
                        <option value="auth">登入 / 授權</option>
                        <option value="wallet">錢包 / 餘額</option>
                        <option value="game">遊戲異常</option>
                        <option value="payment">轉帳 / 提領</option>
                        <option value="suggestion">功能建議</option>
                    </select>
                </label>
                <label>
                    標題
                    <input id="report-title" class="text-input" type="text" maxlength="120" placeholder="例如：硬體授權後卡在等待中">
                </label>
                <label class="full-span">
                    內容描述
                    <textarea id="report-message" class="text-input report-textarea" placeholder="請描述發生頁面、重現步驟、期望結果與實際結果，或是你的建議想法"></textarea>
                </label>
                <label>
                    聯絡方式（選填）
                    <input id="report-contact" class="text-input" type="text" maxlength="120" placeholder="Telegram / LINE / Email">
                </label>
                <label>
                    目前頁面
                    <input id="report-page-url" class="text-input" type="text" readonly>
                </label>
            </div>
            <div class="form-row single-row">
                <button class="btn-primary" onclick="submitIssueReport()">送出回饋</button>
            </div>
            <p id="support-status-msg">待命中</p>
        </div>

        <div class="section-block">
            <h2>我的回饋紀錄</h2>
            <p class="tool-note">管理員更新後，會顯示在每筆回饋的「最新處理更新」。</p>
            <div id="my-report-list" class="report-list">
                <div class="result-empty">尚未載入回饋紀錄</div>
            </div>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/support.js"></script>
    <script>
        window.onload = function () {
            checkGameAuth(function (data) {
                updateUI(data);
                startBalanceRefresh();
                initSupportPage();
            });
        };
    </script>

    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>

</html>
