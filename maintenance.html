<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>系統維護中</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/maintenance.css" />
</head>
<body>
  <div class="bg"></div>
  <main class="wrap">
    <section class="card">
      <div class="badge">Maintenance</div>
      <h1>系統維護中</h1>
      <p class="lead">
        我們正在進行必要的維護作業，暫時關閉登入與遊戲服務。
        預計完成後會第一時間恢復服務。
      </p>
      <div class="meta">
        <div class="meta-item">
          <span class="label">狀態</span>
          <span class="value">暫停服務</span>
        </div>
        <div class="meta-item">
          <span class="label">影響</span>
          <span class="value">登入、遊戲、錢包操作</span>
        </div>
      </div>
      <div class="cta">
        <a class="btn" href="/">返回首頁</a>
        <span class="hint">管理員仍可使用管理介面登入</span>
      </div>
    </section>
    <footer class="foot">Device-Linker</footer>
  </main>
</body>
</html>
