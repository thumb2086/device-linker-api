services:
  # API Web Service
  - type: web
    name: device-linker-api
    env: node
    plan: free
    region: oregon
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm migrate:neon && pnpm --filter api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: device-linker-db
          property: connectionString
      - key: KV_URL
        value: redis://your-redis-url
      - key: KV_REST_API_URL
        value: https://your-kv-url
      - key: KV_REST_API_TOKEN
        value: your-token

  # Frontend Static Site
  - type: static
    name: device-linker-web
    env: static
    buildCommand: pnpm install && pnpm build
    publishPath: apps/web/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://device-linker-api.onrender.com

  # Background Worker
  - type: worker
    name: device-linker-worker
    env: node
    plan: free
    region: oregon
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm --filter worker start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: device-linker-db
          property: connectionString

databases:
  - name: device-linker-db
    plan: free
    region: oregon
    postgresMajorVersion: 15
