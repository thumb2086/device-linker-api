services:
  # API Backend
  - type: web
    name: zixi-casino
    env: node
    plan: free
    region: oregon
    buildCommand: npm install -g pnpm && pnpm install && pnpm build
    startCommand: pnpm migrate:neon && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: zixi-casino-db
          property: connectionString
      - key: KV_URL
        value: redis://your-redis-url
      - key: KV_REST_API_URL
        value: https://your-kv-url
      - key: KV_REST_API_TOKEN
        value: your-token

databases:
  - name: zixi-casino-db
    plan: free
    region: oregon
    postgresMajorVersion: 15
