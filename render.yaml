services:
  # API Backend (Fastify + PostgreSQL)
  - type: web
    name: zixi-casino-api
    env: node
    plan: free
    region: oregon
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @repo/api... build
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false

